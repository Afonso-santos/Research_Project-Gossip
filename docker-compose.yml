x-peers: &peers
  PEERS: >-
    node01=node01:8080,node02=node02:8080,node03=node03:8080,node04=node04:8080,node05=node05:8080,node06=node06:8080,node07=node07:8080,node08=node08:8080,node09=node09:8080,node10=node10:8080

x-common: &common
  build: .
  volumes:
    - /home/afonso/Research_Project/Gossip-SIM/topology/topology.json:/etc/gossip/topology.json:ro
  environment:
    <<: *peers
    TOPOLOGY_FILE: /etc/gossip/topology.json
    TOTAL_SHARES: "10"
  networks:
    - gossip-net
  restart: unless-stopped

services:
  # ── Local IPFS Node ──
  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs_node
    ports:
      - "5001:5001" # IPFS API
      - "8099:8080" # IPFS Gateway
    networks:
      - gossip-net
    restart: unless-stopped

  node01:
    <<: *common
    container_name: node01
    hostname: node01
    environment:
      <<: *peers
      NODE_ID: node01
      PORT: "8080"
      TOPOLOGY_FILE: /etc/gossip/topology.json
      TOTAL_SHARES: "10"
    ports:
      - "8081:8080"

